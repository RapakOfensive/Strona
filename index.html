<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strona dla słodziaka</title>
  
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center; 
      
      background: #1d011af6;
      color: #e0e0ff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .tekst {
      font-size: 4vw;
      font-weight: 600;
      text-align: center;
      padding: 1rem 2rem;
      background: rgba(129, 22, 84, 0.432);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.92; }
      50%      { opacity: 1; }
    }
    .tekst {
      animation: subtlePulse 8s infinite ease-in-out;
    }
  </style>
</head>
<body>

  <div class="tekst">Kocham mojego słodziaka❤️❤️</div>
  <button class="tekst" style="color: white;" onclick="klik()">Jak bardzo go kocham?</button>
  <script>
    let g = document.getElementsByTagName("button");
    let k = 0;
    let s = "❤️";
    function klik(){
      k++;
      const div = document.createElement("div");
      div.textContent = "Bardzo ";
      for(let i=0;i<k;i++){
        div.textContent += s;
      };
      div.className = "tekst";

      document.body.appendChild(div);
    }
  </script>
</body>
</html>
