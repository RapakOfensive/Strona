<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strona dla słodziaka</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    .tabs {
      display: flex;
      background: #1d011af6;
    }

    .tab-button {
      flex: 1;
      padding: 14px 20px;
      background: transparent;
      border: none;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-button:hover {
      background: rgba(255,255,255,0.1);
    }

    .tab-button.active {
      background: rgba(129, 22, 84, 0.432);
      font-weight: bold;
      border-bottom: #1d011af6;
    }
.tab-content {
      display: none;
      padding: 30px;
      background: #1d011af6;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      margin: 20px 0;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
      min-height: 200px;
    }

    .tab-content.active {
      display: block;
    }

    h1 {
      margin-bottom: 1rem;
color: #007bff;
    }
    body {
      margin: 0;
      height: 100vh;
display: flex;
      flex-direction: column; 
      
background: #1d011af6;
      color: #e0e0ff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .tekst {
      font-size: 4vw;
      font-weight: 600;
      text-align: center;
      padding: 1rem 2rem;
      background: rgba(129, 22, 84, 0.432);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      margin:10px;
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.92; }
      50%      { opacity: 1; }
    }
    .tekst {
      animation: subtlePulse 8s infinite ease-in-out;
    }
  </style>
</head>
<body>
<menu class="tabs" style="position: sticky; top: 0; z-index: 10;">
    <button class="tab-button active" data-tab="id1">Mój</button>
    <button class="tab-button" data-tab="id2">Kochany</button>
    <button class="tab-button" data-tab="id3">Najdogodniejszy</button>
    <button class="tab-button" data-tab="id4">Słodziaś</button>
  </menu>

  <main style="flex: 1; overflow-y: auto; padding: 20px; width: 100%;">
    <div class="tekst">Kocham mojego słodziaka❤️❤️</div>
    
    <div id="id1" class="tab-content active">
      <div class="tekst" style="color: white; cursor:pointer;" onclick="klik()">Jak bardzo go kocham?</div>
    </div>

    <div id="id2" class="tab-content">
      <div class="tekst"> 💕</div>
      <div class="tekst" style="font-size: 2vw;">Najprawdziwszy słodziaś ❤️</div>
    </div>

    <div id="id3" class="tab-content">
      <div class="tekst">Przekochany</div>
      <button class="tekst" style="color: white; font-size: 2vw; width:95%;">Słodziaczek</button>
    </div>

    <div id="id4" class="tab-content">
      <div class="tekst">Dogodniaczek</div>
      <div class="tekst" style="font-size: 2vw;">Którego bardzo kocham</div>
    </div>
  </main>



  <script>
    let g = document.getElementsByTagName("button");
    let m = document.getElementById("id1");
    let k = 0;
    let s = "❤️";
    function klik(){
      k++;
      const div = document.createElement("div");
      div.textContent = "Bardzo ";
      for(let i=0;i<k;i++){
        div.textContent += s;
      };
      div.className = "tekst";
      m.append(div);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const buttons = document.querySelectorAll('.tab-button');
      const contents = document.querySelectorAll('.tab-content');

      function showTab(tabId) {
        contents.forEach(el => el.classList.remove('active'));
        buttons.forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
      }

      buttons.forEach(button => {
        button.addEventListener('click', () => {
          const tabId = button.getAttribute('data-tab');
          showTab(tabId);
        });
      });
    });
  </script>
</body>
</html>
