<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strona dla słodziaka</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    .tabs {
      display: flex;
      background: #1d011af6;
    }

    .tab-button {
      flex: 1;
      padding: 14px 20px;
      background: transparent;
      border: none;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-button:hover {
      background: rgba(255,255,255,0.1);
    }

    .tab-button.active {
      background: rgba(129, 22, 84, 0.432);
      font-weight: bold;
      border-bottom: #1d011af6;
    }
.tab-content {
      display: none;
      padding: 30px;
      background: #1d011af6;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      margin: 20px 0;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
      min-height: 200px;
    }

    .tab-content.active {
      display: block;
    }

    h1 {
      margin-bottom: 1rem;
color: #007bff;
    }
    body {
      margin: 0;
      height: 100vh;
display: flex;
      flex-direction: column; 
      
background: #1d011af6;
      color: #e0e0ff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .tekst {
      font-size: 4vw;
      font-weight: 600;
      text-align: center;
      padding: 1rem 2rem;
      background: rgba(129, 22, 84, 0.432);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      margin:10px;
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.92; }
      50%      { opacity: 1; }
    }
    .tekst {
      animation: subtlePulse 8s infinite ease-in-out;
    }
  </style>
</head>
<body>
<menu class="tabs" style="position: sticky; top: 0; z-index: 10;">
    <button class="tab-button active" data-tab="id1">Mój</button>
    <button class="tab-button" data-tab="id2">Kochany</button>
    <button class="tab-button" data-tab="id3">Najdogodniejszy</button>
    <button class="tab-button" data-tab="id4">Słodziaś</button>
  </menu>

  <main style="flex: 1; overflow-y: auto; padding: 20px; width: 100%;">
    <div class="tekst">Kocham mojego słodziaka❤️❤️</div>
    
    <div id="id1" class="tab-content active">
      <div class="tekst" style="color: white; cursor:pointer;" onclick="klik()">Jak bardzo go kocham?</div>
    </div>

    <div id="id2" class="tab-content">
    <div class="tekst">Mam go od 14.11.2024 r.</div>
    <div class="tekst" style="font-size: 4vw;">Co daje:</div>
    <div class="tekst" style="font-size: 3vw;" id="miesiace">0 miesięcy</div>
    <div class="tekst" style="font-size: 3vw;" id="dni">0 dni</div>
    <div class="tekst" style="font-size: 3vw;" id="godziny">0 godzin</div>
    <div class="tekst" style="font-size: 3vw;" id="minuty">0 minut</div>
    <div class="tekst" style="font-size: 3vw;" id="sekundy">0 sekund</div>
    <div class="tekst" style="font-size: 3vw; margin-top: 15px;" id="licznik">
    0 lat, 0 miesięcy, 0 dni, 0 godzin, 0 minut i 0 sekund</div>
    </div>

    <div id="id3" class="tab-content">
      <div class="tekst">Przekochany</div>
      <button class="tekst" style="color: white; font-size: 2vw; width:95%;">Słodziaczek</button>
    </div>

    <div id="id4" class="tab-content">
      <div class="tekst">Dogodniaczek</div>
      <div class="tekst" style="font-size: 2vw;">Którego bardzo kocham</div>
    </div>
  </main>



  <script>
    let g = document.getElementsByTagName("button");
    let m = document.getElementById("id1");
    let k = 0;
    let s = "❤️";
    function klik(){
      k++;
      const div = document.createElement("div");
      div.textContent = "Bardzo ";
      for(let i=0;i<k;i++){
        div.textContent += s;
      };
      div.className = "tekst";
      m.append(div);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const buttons = document.querySelectorAll('.tab-button');
      const contents = document.querySelectorAll('.tab-content');

      function showTab(tabId) {
        contents.forEach(el => el.classList.remove('active'));
        buttons.forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
      }

      buttons.forEach(button => {
        button.addEventListener('click', () => {
          const tabId = button.getAttribute('data-tab');
          showTab(tabId);
        });
      });
    });

    const dataPoczatkowa = new Date("2024-11-14 00:00:00");

    function aktualizujLicznik() {
        const teraz = new Date();
        const roznicaMs = teraz - dataPoczatkowa;

        const sekundyCalk = Math.floor(roznicaMs / 1000);

        const sekundy = sekundyCalk;
        const minuty  = Math.floor(sekundyCalk / 60);
        const godziny = Math.floor(sekundyCalk / 3600);
        const dni = Math.floor(sekundyCalk / 86400);
        const miesiace = Math.floor(dni / 30.436875);

        document.getElementById("miesiace").textContent = miesiace + (miesiace === 1 ? " miesiąc" : " miesięcy");
        document.getElementById("dni").textContent     = dni     + (dni     === 1 ? " dzień"   : " dni");
        document.getElementById("godziny").textContent = godziny + (godziny === 1 ? " godzina" : " godzin");
        document.getElementById("minuty").textContent  = minuty  + (minuty  === 1 ? " minuta"  : " minut");
        document.getElementById("sekundy").textContent = sekundy + (sekundy === 1 ? " sekunda" : " sekund");
    }
    setInterval(aktualizujLicznik, 1000);
    aktualizujLicznik();
    
function aktualizuj() {
    const teraz = new Date();
    let diff = teraz - dataPoczatkowa;

    const sekundy = Math.floor(diff / 1000) % 60;
    const minuty  = Math.floor(diff / 60000) % 60;
    const godziny = Math.floor(diff / 3600000) % 24;

    let temp = new Date(dataPoczatkowa);
    let lata = 0;
    let miesiace = 0;

    while (temp.getFullYear() < teraz.getFullYear() || 
           (temp.getFullYear() === teraz.getFullYear() && temp.getMonth() <= teraz.getMonth())) {
        temp.setMonth(temp.getMonth() + 1);
        miesiace++;
        
        if (miesiace === 12) {
            lata++;
            miesiace = 0;
        }
    }
    miesiace--;

    const dataPoLatachMiesiacach = new Date(dataPoczatkowa);
    dataPoLatachMiesiacach.setFullYear(dataPoLatachMiesiacach.getFullYear() + lata);
    dataPoLatachMiesiacach.setMonth(dataPoLatachMiesiacach.getMonth() + miesiace);

    const dni = Math.floor((teraz - dataPoLatachMiesiacach) / 86400000);

    let tekst = "";

    if (lata > 0) {
        tekst += `${lata} `;
        tekst += (lata === 1) ? "rok" : (lata < 5 ? "lata" : "lat");
        tekst += ", ";
    }

    tekst += `${miesiace} miesiąc`;
    if (miesiace !== 1){
      if(miesiace < 5 && miesiace > 1){
        tekst = tekst.replace("miesiąc", "miesiące")
      }else{
        tekst = tekst.replace("miesiąc", "miesięcy")
      }
    }

    tekst += `, ${dni} dzień`;
    if (dni !== 1) tekst = tekst.replace("dzień", "dni");

    tekst += `, ${godziny} godzin`;
    if (godziny === 1) tekst = tekst.replace("godzin", "godzina");

    tekst += `, ${minuty} minut`;
    if (minuty === 1) tekst = tekst.replace("minut", "minuta");

    tekst += ` i ${sekundy} sekund`;
    if (sekundy === 1) tekst = tekst.replace("sekund", "sekunda");

    document.getElementById("licznik").textContent = tekst;
}
setInterval(aktualizuj, 1000);
aktualizuj();
  </script>
</body>
</html>
